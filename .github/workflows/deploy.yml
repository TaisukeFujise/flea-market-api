name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/390957602026/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deploy@term9-taisuke-fujise.iam.gserviceaccount.com"

      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -fsSL https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64 -o cloud-sql-proxy
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Auth Proxy
        run: |
          ./cloud-sql-proxy --port 5432 term9-taisuke-fujise:asia-northeast1:flea-market-db &
          until (echo > /dev/tcp/localhost/5432) 2>/dev/null; do sleep 1; done

      - name: Get secrets
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            database_url:term9-taisuke-fujise/DATABASE_URL

      - name: Install migrate CLI
        run: |
          curl -fsSL https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        run: |
          MIGRATION_URL=$(echo "${{ steps.secrets.outputs.database_url }}" | sed 's|@/flea_market?host=/cloudsql/.*|@localhost:5432/flea_market?sslmode=disable|')
          migrate -path migrations -database "$MIGRATION_URL" up

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev

      - name: Build and Push Docker image
        run: |
          docker build -t asia-northeast1-docker.pkg.dev/term9-taisuke-fujise/flea-market/flea-market-api:${{ github.sha }} .
          docker push asia-northeast1-docker.pkg.dev/term9-taisuke-fujise/flea-market/flea-market-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy flea-market-api \
            --image asia-northeast1-docker.pkg.dev/term9-taisuke-fujise/flea-market/flea-market-api:${{ github.sha }} \
            --region asia-northeast1 \
            --project term9-taisuke-fujise \
            --service-account flea-market-api@term9-taisuke-fujise.iam.gserviceaccount.com
